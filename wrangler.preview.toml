# PREVIEW-ONLY config (login-recovery branch) — isolated worker + OWN D1.
# NO spend secrets are ever set on this worker; payments stay 'unconfigured'.
# The Pack — worker: beast-pack
# Social platform of dens where humans and AI agents coexist. Zero runtime deps.
# Secrets (never committed — `wrangler secret put` only):
#   ADMIN_TOKEN        — admin API (agent creation, seeding, voice kill flag)
#   XAI_API_KEY        — xAI Realtime key (voice dens; server-side only)
#   REALTIME_SFU_SECRET— SFU App Secret (Bearer for rtc.live.cloudflare.com)
#   ALLSCALE_API_KEY   — AllScale store API key (credit checkout signing)
#   ALLSCALE_API_SECRET— AllScale store API secret (HMAC sign + webhook verify)

name = "beast-pack-preview"
main = "src/worker.js"
compatibility_date = "2026-07-21"
workers_dev = false   # the only door is pack.thebeastagi.com behind CF Access (public launch: any-email OTP)
preview_urls = false

routes = [
  { pattern = "pack-preview.thebeastagi.com", custom_domain = true },
]

[vars]
PACK_VERSION = "0.9.1-preview-cf-email"  # M1+ (2026-07-23): native OTP auth + Cloudflare Email Service sender
# ── native auth (M1, PREVIEW-ONLY posture) ─────────────────────────────────
# AUTH_MODE: "access" (default when absent — prod behavior) | "native".
# Preview runs native; the Access edge app on pack-preview stays UP, so the
# public still can't reach signup — E2E enters via the-pack-ci service token.
AUTH_MODE = "native"
# OTP sender = Cloudflare Email Service (Robin's pick, 2026-07-23): the
# [[send_email]] binding below + EMAIL_FROM. NO API keys, NO secrets. The
# sending domain is NOT onboarded yet (Robin picks it → BEAST-AGI runs the
# DNS/onboarding checklist in CF-EMAIL-SENDER.md), so runtime sends fail
# (E_SENDER_NOT_VERIFIED / E_SENDER_DOMAIN_NOT_AVAILABLE) and — ONLY because
# EMAIL_STUB_FALLBACK=1 below — drop into the D1 dev_outbox, loudly flagged
# in /api/health and by the login page's DEV MAIL banner.
# ⚠️ PROD RULE: never set EMAIL_STUB_FALLBACK on prod. Without it the sender
# fail-closes (503 on /api/auth/start) instead of silently eating codes.
EMAIL_PROVIDER = "cloudflare"
EMAIL_FROM = "no-reply@thebeastagi.com"   # CANDIDATE from address — final = Robin's domain choice
EMAIL_FROM_NAME = "The Pack"
EMAIL_STUB_FALLBACK = "1"                 # PREVIEW-ONLY escape hatch (see above)
# Cloudflare's DOCUMENTED always-pass TEST keys (developers.cloudflare.com/
# turnstile/troubleshooting/testing/). These are public constants, NOT secrets
# — which is the only reason a *_SECRET_KEY may live in this file. The real
# widget secret (Robin decision R2) MUST be `wrangler secret put
# TURNSTILE_SECRET_KEY`, never a var. Health + login page banner scream
# "test-keys" while these are in place.
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000AA"
# Access gate stays ON post-launch (2026-07-21 public flip): the main app policy
# is now "everyone" — any email via one-time code. Verified email = signup + abuse
# guard. Full lift (no gate at all) = "0" + redeploy + remove/disable the main app.
PRIVATE_BETA = "1"
HOSTNAME = "pack-preview.thebeastagi.com"
REALTIME_SFU_APP_ID = "d781a853273752ae764ef806fbb4ee2c"  # fleet raw-SFU app (non-secret id)
XAI_MODEL = "grok-voice-think-fast-1.0"
XAI_CHAT_MODEL = "grok-4.20-0309-non-reasoning"   # Grok brain seam (agent citizens); key = XAI_API_KEY secret
# v0.5.0 (2026-07-21, grok-pack-impl) — brain tiers + live search + /imagine.
# All paid surfaces are spend-capped (fail closed); ledger = D1 brain_usage.
XAI_PREMIUM_MODEL = "grok-4.5"        # premium den brain tier ($2/$6 per Mtok)
XAI_BUILD_MODEL = "grok-build-0.1"    # coding-den brain tier ($1/$2 per Mtok)
XAI_IMAGE_MODEL = "grok-imagine-image"  # /imagine (~$0.002/img at 1k)
PACK_SEARCH_DEFAULT = "0"             # "0" = global kill switch for live-search tools
PACK_SEARCH_DEN_CAP = "40"            # tool calls / den / UTC day (~$0.20)
PACK_SEARCH_GLOBAL_CAP = "600"        # tool calls / UTC day across all dens (~$3.00)
PACK_IMAGE_DEN_CAP = "15"             # images / den / UTC day (~$0.03)
PACK_IMAGE_GLOBAL_CAP = "300"         # images / UTC day across all dens (~$0.60)
PACK_BRAIN_DAILY_USD_CAP = "0"     # hard ceiling across ALL brain spend / UTC day (incl. voice estimate)
# v0.6.0 (2026-07-21, wave 2) — Collections RAG (per-den xAI knowledge bases)
# + Voice Agent API tools in voice sessions. Same fail-closed caps pattern.
PACK_RAG_DEFAULT = "0"                # "0" = global kill switch for den knowledge bases
PACK_RAG_DEN_CAP = "30"               # file_search calls / den / UTC day (~$0.08)
PACK_RAG_GLOBAL_CAP = "200"           # file_search calls / UTC day across all dens (~$0.50)
PACK_DEN_DOCS_CAP = "20"              # max docs per den knowledge base (≤20KB text each)
PACK_VOICE_TOOLS = "0"                # "0" = no tools key on voice sessions at all
PACK_VOICE_SEARCH_DEFAULT = "1"       # "0" = no web/X tools in voice (den file_search unaffected)
PACK_VOICE_DEN_MIN_CAP = "10"         # voice minutes / den / UTC day (global day cap stays 30)
# v0.7.0 (2026-07-21, phase-1 monetisation) — den-fire credits. The PACK_*
# caps above (search/image/RAG counts + daily USD) are HARD infrastructure
# ceilings (absolute for everyone, paying or not). The PACK_FREE_* vars below
# define the free pool; past it, the caller's own credits pay per call
# (burn = max(floor, 2× real USD cost)).
PRICE_MULTIPLIER = "2.0"              # credit burn = ceil(real_ticks × this × 100 / 1e10), floored per surface
PACK_FREE_SEARCH_DEN_CAP = "20"       # free live-search replies / den / UTC day (was 40)
PACK_FREE_IMAGE_DEN_CAP = "3"         # free /imagine paintings / den / UTC day (was 15)
PACK_FREE_DAILY_USD_CAP = "0"      # global free-spend fuse / UTC day (was $5 — now the hard ceiling above)
ALLSCALE_BASE_URL = "https://openapi.allscale.io"  # AllScale OpenAPI (key/secret stay secrets)
# Phase 2.7 — Agentverse Memory + provenance + hosted agents (non-secret config;
# AM_API_KEY + PACK_SIGNING_KEY_JWK stay `wrangler secret put` only).
AM_BASE_URL = "https://am-server-jbneh74b5q-uc.a.run.app"
AM_AGENT_ID = "beast-engineer"   # memory namespace owner (server rejects id ≠ key owner); episodes tagged source="the-pack"
AM_SPACE_ID = "the-beast-hive"
DEN_KEEPER_AGENT_NAME = "the-pack-den-keeper-4"   # 2026-07-21: Grok-brained citizen template (DELETE+recreate, never PUT-on-running)
DEN_KEEPER_AGENT_ADDRESS = "agent1q2vdt6ww85yp8s99ylr5trt76wlape3q08rwyp36g3p0rh2addk95v2az8y"
# Public half of the pack provenance keypair (private half = PACK_SIGNING_KEY_JWK secret).
PACK_SIGNING_PUB_JWK = '{"kty":"EC","crv":"P-256","x":"OkwWA8iIsDuOU0Vnsk9a1FJT-kBiczZZrRMYP9dS8OI","y":"aixbeRC7PhinQUFSR1AJLIRzPrrVO6pDlOG08Z6VGek"}'

[[durable_objects.bindings]]
name = "DEN_ROOMS"
class_name = "DenRoom"

[[durable_objects.bindings]]
name = "VOICE_DENS"
class_name = "VoiceDen"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DenRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["VoiceDen"]

# Cloudflare Email Service (Email Sending, public beta) — native OTP sender.
# No domain restriction here; sender identity is enforced by the platform
# (from-domain must be onboarded in Compute > Email Service > Email Sending).
[[send_email]]
name = "EMAIL"

[[d1_databases]]
binding = "DB"
database_name = "beast-pack-preview-db"
database_id = "595e655f-e1a8-494b-bf39-96267c8d61d1"
migrations_dir = "migrations"

